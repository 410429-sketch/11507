<html>
    <haed><title>0316-css大小與顏色</title>
        <style>
        /*css註解*/
        /*css基礎語法
        選擇器 Selector{property:value;
        屬性:設定值
        屬性:設定值
        選擇器有三種寫法(優先順序高到到低):#id/.ciass/hmtl_tag
        }*/
        div{width: 200px;
            height: 200px;display: inline-block}
        span{width: 200px;height: 200px;
        display: inline-block;}

        #d1{}
        .c1{background:red ;}
        .c2{background: hsl(hue, saturation, lightness);}
        </style>
    </haed>
<body>
<!--div:區塊容器 block-->
<div di="d1"class="c1"></div>
<div di="d2"class="c1 c2"></div>

<!--span:行內容器=inline-->
<span></span>
</body>
</html>
