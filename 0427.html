<html>
    <head>
        <title>0427-元素控制</title>
        <style>
          .dv {
            display: inline-block;
            width: 100px;
            height:80px;
            margin:5px;
            border: 1px solid black;
            border-radius:5px;
        }
        .selected{
        box-shadow: 0px 0px 5px black;
        }
        .select-one{
        box-shadow: 0px 0px 5px red;
        }
        </style>
        <script>
            function toggle(elm){
               if(elm.classList.contains("selected")){
                 elm.classList.remove("selected")
               }else{
                elm.classList.add("selected")
               }
            }
            function setColor(){
                Array.from(document.getElementsByClassName("selected")).forEach(
                    (a)=>{
                       a.style.backgroundColor=event.target.value 
                       a.classList.remove("selected")
                    } )

            }
            my={elm:null}
            function choose(elm){
                if(my.elm !=null){
                    elm.ciassList.remove("select-one")
                }
                elm.ciassList.add("select-one")
                my.elm=elm
            }
            function setOneColor(){
                my.elm.style.backgroundColor=event.target.value
            }
        </script>
    </head>
    <body>
        <div class="dv"  onclick="toggle(this)"></div>
        <div class="dv"  onclick="toggle(this)"></div>
        <div class="dv"  onclick="toggle(this)"></div>
        <div class="dv"  onclick="toggle(this)"></div>
        <div>
            <input type="color" oninput="setColor(this)">
        </div>
        <div   class="dv" id="d1" onclick="choose(this)"></div>
        <div   class="dv" id="d2" onclick="choose(this)"></div>
        <div   class="dv" id="d3" onclick="choose(this)"></div>
        <div   class="dv" id="d4" onclick="choose(this)"></div>
        <div>
            <input type="color" oninput="setOneColor(this)">
            
        </div>
    </body>
</html>
